# Allow provisioning Wi-Fi via serial
improv_serial:

wifi:
  id: wifi_comp
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  reboot_timeout: 0s

  # Set minimum WiFi security - reject connections to networks with weaker security
  # Default is WPA2 on ESP32, WPA on ESP8266 (will change to WPA2 in 2026.6.0)
  min_auth_mode: WPA2  # Or WPA3 for ESP32 if all your networks support it

  ap:
    ssid: ${wifi_ap_ssid}
    password: ${wifi_ap_password}
    ap_timeout: 10s

    manual_ip:
      static_ip: 192.168.10.1
      gateway: 192.168.10.1
      subnet: 255.255.255.0
# Time configuration for clock
time:
  - platform: sntp
    id: esptime
    timezone: "CET-1CEST,M3.5.0,M10.5.0/3"  # Germany timezone
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org

dashboard_import:
  package_import_url: "github://esphome/firmware/esphome-web/esp32s2.yaml@main"
  import_full_config: true

web_server:
  port: 80
  auth:
    username: ${web_user}
    password: ${web_password}

debug:
  update_interval: 5s